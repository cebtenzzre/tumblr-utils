site_name: tumblr-backup
site_description: Back up your Tumblr blog locally as browsable HTML files, with images and media.
site_url: https://cebtenzzre.github.io/tumblr-utils
repo_url: https://github.com/cebtenzzre/tumblr-utils
repo_name: cebtenzzre/tumblr-utils

plugins:
  - search
  - social

theme:
  name: material

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Cookies: cookies.md
  - Usage: usage.md
  - How It Works: operation.md
